<!DOCTYPE html>
<html>

<head>
    <title>Canvas Test Bed</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <style type="text/css">
        #testCanvas {
            background-color: silver;
            margin: 30px;
        }

        body {
            text-align: center;
            color: silver;
            background-color: rgb(53, 66, 29);
        }

        .key-hint {
            color: #ccc;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
    <script>
        window.addEventListener("load", function () {
            // Get canvas and drawing context
            const canvas = document.getElementById('testCanvas');
            const ctx = canvas.getContext('2d');

            // Global State
            // For houses: start drawing from x = 30, each house is 60px wide, with 10px gap
            let nextHouseX = 30;           // x-coordinate for the next house (left side)
            const HOUSE_WIDTH = 60;
            const HOUSE_BASE_HEIGHT = 60;  // height of the main rectangular part
            const ROOF_HEIGHT = 30;
            const GROUND_Y = 300;           // where the ground line is (house sits on it)

            // Remember the most recently drawn house's x (left side) to place cars under it
            let lastHouseX = null;           // will be updated after each house draw

            // Arrays to store persistent objects
            let houses = [];          // each entry: { x: number }
            let cars = [];            // each entry: { x: number, y: number }  (car drawn under house)
            let stars = [];           // each entry: { x, y, size, color }

            // ** Moving circle (arrow key control) **
            let circleX = 200;
            let circleY = 200;
            const CIRCLE_RADIUS = 15;

            // Drawing Functions

            /**
             * Draw a simple line house at given x (left side).
             * House sits on the ground (GROUND_Y). Updates lastHouseX.
             */
            function drawHouse(x) {
                // Base rectangle (house body)
                const baseTopY = GROUND_Y - HOUSE_BASE_HEIGHT; // e.g. 300-60=240
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 2;

                // Draw base outline
                ctx.strokeRect(x, baseTopY, HOUSE_WIDTH, HOUSE_BASE_HEIGHT);

                // Draw roof (triangle)
                ctx.beginPath();
                ctx.moveTo(x, baseTopY);                     // left top corner of base
                ctx.lineTo(x + HOUSE_WIDTH / 2, baseTopY - ROOF_HEIGHT); // peak
                ctx.lineTo(x + HOUSE_WIDTH, baseTopY);        // right top corner
                ctx.closePath();
                ctx.stroke();

                // Draw door (small rectangle)
                const doorWidth = 20;
                const doorHeight = 30;
                const doorX = x + (HOUSE_WIDTH - doorWidth) / 2;
                const doorY = GROUND_Y - doorHeight;          // door sits on ground
                ctx.strokeRect(doorX, doorY, doorWidth, doorHeight);

                // Draw window (small square)
                const windowSize = 15;
                const windowX = x + 10;
                const windowY = baseTopY + 15;
                ctx.strokeRect(windowX, windowY, windowSize, windowSize);
                // cross in window
                ctx.beginPath();
                ctx.moveTo(windowX, windowY);
                ctx.lineTo(windowX + windowSize, windowY + windowSize);
                ctx.moveTo(windowX + windowSize, windowY);
                ctx.lineTo(windowX, windowY + windowSize);
                ctx.stroke();

                // Update state
                lastHouseX = x;
            }

            /**
             * Draw a simple car at given (carX, carY) — used both for direct drawing and redraw.
             */
            function drawCarAt(carX, carY) {
                // Car dimensions
                const carWidth = 50;
                const carHeight = 25;
                const wheelRadius = 6;

                ctx.strokeStyle = 'black';
                ctx.lineWidth = 2;

                // Car body (rectangle)
                ctx.strokeRect(carX, carY, carWidth, carHeight);

                // Roof (smaller rectangle on top)
                const roofWidth = 30;
                const roofHeight = 15;
                const roofX = carX + (carWidth - roofWidth) / 2;
                const roofY = carY - roofHeight;
                ctx.strokeRect(roofX, roofY, roofWidth, roofHeight);

                // Wheels (circles)
                ctx.beginPath();
                ctx.arc(carX + 10, carY + carHeight, wheelRadius, 0, 2 * Math.PI);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(carX + carWidth - 10, carY + carHeight, wheelRadius, 0, 2 * Math.PI);
                ctx.stroke();
            }

            // Original drawCar now stores the car and redraws whole scene (to keep consistent)
            function drawCar() {
                if (lastHouseX === null) {
                    console.log("No house yet — draw a house first (button 2)");
                    return;
                }

                // Car dimensions (same as in drawCarAt)
                const carWidth = 50;
                const carHeight = 25;
                const carX = lastHouseX + (HOUSE_WIDTH - carWidth) / 2; // center under house
                const carY = GROUND_Y + 5; // just below ground line

                // Store car
                cars.push({ x: carX, y: carY });

                // Redraw everything (including new car)
                redrawScene();
            }

            /**
             * Draw a star at (x, y) with given size and fill color.
             */
            function drawStar(x, y, size, color) {
                ctx.fillStyle = color;
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 1;
                ctx.beginPath();

                let points = 5;
                let outerRadius = size;
                let innerRadius = size * 0.4;
                for (let i = 0; i < points * 2; i++) {
                    let radius = i % 2 === 0 ? outerRadius : innerRadius;
                    let angle = (Math.PI / points) * i - Math.PI / 2;
                    let dx = Math.cos(angle) * radius;
                    let dy = Math.sin(angle) * radius;
                    if (i === 0) {
                        ctx.moveTo(x + dx, y + dy);
                    } else {
                        ctx.lineTo(x + dx, y + dy);
                    }
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }

            //Scene Redraw
            function redrawScene() {
                // Clear with silver background
                ctx.fillStyle = 'silver';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw all houses from stored array
                houses.forEach(h => drawHouse(h.x));

                // Draw all cars from stored array
                cars.forEach(c => drawCarAt(c.x, c.y));

                // Draw all stars from stored array
                stars.forEach(s => drawStar(s.x, s.y, s.size, s.color));

                // Draw the movable circle (green)
                ctx.fillStyle = '#2ecc71';  // bright green
                ctx.beginPath();
                ctx.arc(circleX, circleY, CIRCLE_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'darkgreen';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Button Handlers
            const buttons = document.querySelectorAll('input[type="button"]');

            // Button 2 (index 1) – draw house
            buttons[1].addEventListener('click', function () {
                if (nextHouseX + HOUSE_WIDTH <= canvas.width) {
                    // Store house
                    houses.push({ x: nextHouseX });
                    // Update next house position
                    nextHouseX += HOUSE_WIDTH + 10;

                    // Redraw everything
                    redrawScene();
                } else {
                    console.log("No space left for another house!");
                }
            });

            // Button 3 (index 2) – draw car (stores and redraws)
            buttons[2].addEventListener('click', drawCar);

            // Button 4 (index 3) – draw random star in sky
            buttons[3].addEventListener('click', function () {
                const skyMinY = 20;
                const skyMaxY = 200;
                const randomX = Math.random() * canvas.width;
                const randomY = skyMinY + Math.random() * (skyMaxY - skyMinY);
                const hue = Math.floor(Math.random() * 360);
                const color = `hsl(${hue}, 90%, 65%)`;
                const size = 8 + Math.random() * 10;

                // Store star
                stars.push({ x: randomX, y: randomY, size: size, color: color });

                // Redraw
                redrawScene();
            });

            // Arrow Key Control
            window.addEventListener('keydown', function (e) {
                const key = e.key;
                // Prevent page scrolling
                if (key.startsWith('Arrow')) {
                    e.preventDefault();
                }

                let moved = false;
                switch (key) {
                    case 'ArrowUp':
                        circleY = Math.max(CIRCLE_RADIUS, circleY - 10);
                        moved = true;
                        break;
                    case 'ArrowDown':
                        circleY = Math.min(canvas.height - CIRCLE_RADIUS, circleY + 10);
                        moved = true;
                        break;
                    case 'ArrowLeft':
                        circleX = Math.max(CIRCLE_RADIUS, circleX - 10);
                        moved = true;
                        break;
                    case 'ArrowRight':
                        circleX = Math.min(canvas.width - CIRCLE_RADIUS, circleX + 10);
                        moved = true;
                        break;
                }

                if (moved) {
                    redrawScene();
                }
            });

            // Initial draw (circle at center, no houses/cars/stars)
            redrawScene();

            console.log("Ready! Use buttons to build a night scene. Arrow keys move the green circle.");
        });
    </script>
</head>

<body>
    <h1>Canvas Test Bed 4</h1>
    <canvas id="testCanvas" width="400" height="400"></canvas>
    <br>
    <input type="button" value="Button 1">
    <input type="button" value="Button 2">
    <input type="button" value="Button 3">
    <input type="button" value="Button 4">
    <div class="key-hint">←↑↓→ move the green circle</div>
</body>

</html>
