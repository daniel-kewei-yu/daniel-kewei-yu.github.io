<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Generator Form</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .form-container:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #333;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 36px;
            text-align: center;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border 0.3s, box-shadow 0.3s;
            background: #fafafa;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="number"]:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .form-group input[type="color"] {
            width: 100%;
            height: 50px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            background: #fafafa;
            padding: 5px;
        }

        .form-group input[type="color"]:hover {
            border-color: #667eea;
        }

        .row-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .row-group .form-group {
            flex: 1 1 200px;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 19px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(102, 126, 234, 0.5);
        }

        button[type="submit"]:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .note {
            background: #f0f4ff;
            border-radius: 10px;
            padding: 15px;
            margin-top: 25px;
            color: #4a5568;
            font-size: 15px;
            border-left: 5px solid #667eea;
            text-align: center;
        }

        .note p {
            margin: 0;
        }

        .note strong {
            color: #5a67d8;
        }

        @media (max-width: 500px) {
            .form-container {
                padding: 25px;
            }

            h1 {
                font-size: 29px;
            }

            .row-group {
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="form-container">
        <h1>Customizable Table Generator</h1>
        <form action="multTable.php" method="get">
            <div class="form-group">
                <label>Table Title</label>
                <input type="text" name="title" value="Multiplication Table" required>
            </div>
            <div class="row-group">
                <div class="form-group">
                    <label>Rows (1-20)</label>
                    <input type="number" name="rows" min="1" max="20" value="10" required>
                </div>
                <div class="form-group">
                    <label>Columns (1-20)</label>
                    <input type="number" name="cols" min="1" max="20" value="10" required>
                </div>
            </div>
            <div class="form-group">
                <label>Operation</label>
                <select name="operation">
                    <option value="multiply">Multiplication (x)</option>
                    <option value="add">Addition (+)</option>
                    <option value="subtract">Subtraction (-)</option>
                </select>
            </div>
            <div class="row-group">
                <div class="form-group">
                    <label>Header Background</label>
                    <input type="color" name="header_color" value="#3498db">
                </div>
                <div class="form-group">
                    <label>Table Background</label>
                    <input type="color" name="bg_color" value="#ffffff">
                </div>
                <div class="form-group">
                    <label>Text Color</label>
                    <input type="color" name="text_color" value="#000000">
                </div>
            </div>
            <button type="submit">Generate Table</button>
        </form>
        <div class="note">
            <p><strong>Note:</strong> If any parameters are missing, default values will be used.</p>
        </div>
    </div>
</body>

</html>
