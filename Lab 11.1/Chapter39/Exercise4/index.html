<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Population Search</title>
    <link rel="stylesheet" href="cities.css">
</head>
<body>
    <div class="container">
        <h1>City Population Search</h1>
        <p>Enter a population range to find cities in the world database.</p>

        <form id="cityForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="min">Min population:</label>
                    <input type="number" id="min" name="min" min="0" required>
                </div>
                <div class="form-group">
                    <label for="max">Max population:</label>
                    <input type="number" id="max" name="max" min="0" required>
                </div>
                <button type="submit" id="submitBtn">Search</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div> Loading cities...
        </div>

        <div id="results">
            <h2>Results</h2>
            <ul id="cityList"></ul>
            <div id="errorMsg" class="error"></div>
        </div>
    </div>

    <script src="cities.js"></script>
</body>
</html>
