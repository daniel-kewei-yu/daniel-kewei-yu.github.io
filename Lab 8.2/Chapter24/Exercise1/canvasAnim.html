<!DOCTYPE html>
<!--
Modified Canvas Animation
- Moves down and to the right
- Shrinks over time
- Starts black (0) and ends red (255)
-->
<html>

<head>
    <title>Modified Canvas Animation</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <script type='text/javascript'>
        window.addEventListener("load", function (event) {
            // ball object with new properties
            const ball = {
                x: 350, y: 200,
                xSpeed: 1,             // positive = right
                ySpeed: 0.5,           // positive = down
                redValue: 0,           // starts at black (0)
                radius: 20             // start larger so shrinking is visible
            };
            let timerId;

            const c = document.getElementById("animationCanvas");
            const ctx = c.getContext("2d");

            function startAnimation() {
                timerId = setInterval(updateAnimation, 16);
                console.log("Animation Started");
            }

            function stopAnimation() {
                clearTimeout(timerId);
                console.log("Animation Stopped");
            }

            function updateAnimation() {
                // 1. Update position
                ball.x += ball.xSpeed;
                ball.y += ball.ySpeed;

                // 2. Shrink the ball (but keep it at least 1px radius)
                if (ball.radius > 1) {
                    ball.radius -= 0.1;
                }

                // 3. Change color from black to red
                if (ball.redValue < 255) {
                    ball.redValue += 1;   // gradually increase red component
                }

                // 4. Clear canvas
                ctx.clearRect(0, 0, c.width, c.height);

                // 5. Draw ball with current redValue
                ctx.fillStyle = "rgb(" + ball.redValue + ", 0, 0)";
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();

                // 6. Collision detection: stop when hitting edge (optional)
                if (ball.x >= c.width - ball.radius || ball.x <= ball.radius ||
                    ball.y >= c.height - ball.radius || ball.y <= ball.radius) {
                    stopAnimation();
                }
            }

            startAnimation();
        });
    </script>
</head>

<body style='text-align:center;'>
    <canvas id='animationCanvas' width='768' height='400' style='background-color:black;'></canvas>
</body>

</html>
