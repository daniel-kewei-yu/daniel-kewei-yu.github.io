<!DOCTYPE html>
<!--
To be used in exercises. 

NOTE ON ABSOLUTE POSITIONING: When an element has position:absolute, you can place 
anywhere on the page you want. You can specify a pixel position of the top, left
corner using the top and left CSS properties. If the element is a child of
<body> this will position it relative to the top left corner of the page.

If an element with absolute position is inside another element with absolute
position (as the "moveme" div is below) you specify top and left to move it 
relative to the top left corner of the containing element. So for this element,
top: 0px and left: 0px puts it in the top left corner of the "container" div.

-->
<html>

<head>
    <title>Move Me Exercise</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #container {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 500px;
            height: 500px;
            border: 10px solid black;
            border-radius: 70px;
        }

        #moveme {
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100px;
            height: 100px;
            background-color: green;
            border-radius: 100px;
            border: 10px solid black;
        }
    </style>
    <script>
        // Part a: Move to random position
        function moveRandom() {
            if (confirm("Do you want to move the circle to a random position?")) {
                const circle = document.getElementById('moveme');

                // Calculate maximum positions (container width/height minus circle width/height)
                const maxTop = 500 - 120; // 120 = 100px height + 20px border (10px top + 10px bottom)
                const maxLeft = 500 - 120; // 120 = 100px width + 20px border (10px left + 10px right)

                // Generate random positions within bounds
                const randomTop = Math.floor(Math.random() * maxTop);
                const randomLeft = Math.floor(Math.random() * maxLeft);

                // Apply new positions
                circle.style.top = randomTop + 'px';
                circle.style.left = randomLeft + 'px';
            }
        }

        // Variables to track current position
        let currentTop = 0;
        let currentLeft = 0;

        // Part b & c: Move in direction with bounds checking
        function moveDirection() {
            const direction = prompt("Enter U, D, L, R, or Q (for Up, Down, Left, Right, Quit):");

            if (direction === null || direction.toUpperCase() === 'Q') {
                return; // User clicked cancel or entered Q
            }

            const circle = document.getElementById('moveme');

            // Calculate maximum positions
            const maxTop = 500 - 120; // 380
            const maxLeft = 500 - 120; // 380

            // Move based on direction
            switch (direction.toUpperCase()) {
                case 'U': // Up
                    if (currentTop - 20 >= 0) {
                        currentTop -= 20;
                    }
                    break;
                case 'D': // Down
                    if (currentTop + 20 <= maxTop) {
                        currentTop += 20;
                    }
                    break;
                case 'L': // Left
                    if (currentLeft - 20 >= 0) {
                        currentLeft -= 20;
                    }
                    break;
                case 'R': // Right
                    if (currentLeft + 20 <= maxLeft) {
                        currentLeft += 20;
                    }
                    break;
                default:
                    alert("Invalid input. Please enter U, D, L, R, or Q.");
                    return;
            }

            // Apply new positions
            circle.style.top = currentTop + 'px';
            circle.style.left = currentLeft + 'px';
        }

        // Initialize position tracking when page loads
        window.onload = function () {
            const circle = document.getElementById('moveme');
            currentTop = parseInt(circle.style.top) || 0;
            currentLeft = parseInt(circle.style.left) || 0;
        };
    </script>
</head>

<body>
    <div id="container">
        <div id='moveme'></div>
    </div>
    <p style="position: absolute; top: 570px; left: 50px;">
        Open the console and run:<br>
        - moveRandom() to move the circle to a random position<br>
        - moveDirection() to move the circle in a specific direction
    </p>
</body>

</html>
